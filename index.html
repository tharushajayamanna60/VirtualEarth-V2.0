<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Virtual Earth V2.0 | tharushajayamanna60</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
	
  <div id="container"></div>
  <div id="ui">
    <button id="drawPathBtn">Start Draw</button>
    <button id="playPathBtn">Play Path</button>
    <button id="clearPathBtn">Clear Path</button>
    <button id="stopPathBtn">Stop</button>
    <button id="resetViewBtn">Reset View</button>
    <input id="xInput" type="number" step="0.5" value="0" placeholder="X">
    <input id="yInput" type="number" step="0.5" value="0" placeholder="Y">
    <input id="zInput" type="number" step="0.5" value="0" placeholder="Z">
    <button id="addPointBtn">Add Point</button>
    <label for="heightInput">Alt:</label>
    <input id="heightInput" type="range" min="0.5" max="20" step="0.5" value="3">
    <span id="heightValue">3.0</span>
    <span id="positionMap">Pos: 0, 0, 0</span>
    <span id="pathStatus">Ready</span>
  </div>

  <script src="assets/three.min.js"></script>
  <script src="assets/SVGLoader.js"></script>
  <script src="assets/OrbitControls.js"></script>
  <script src="script_new.js"></script>
</body>
</html>
